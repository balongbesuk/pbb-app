<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Peta GIS Desa</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f172a; }
    #map { width: 100vw; height: 100vh; }
    
    #loading-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: #0f172a;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      transition: opacity 0.5s;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid rgba(59,130,246,0.2);
      border-top: 4px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 20px;
    }
    .spinner-sm {
      width: 24px; height: 24px;
      border: 3px solid rgba(59,130,246,0.2);
      border-top: 3px solid #3b82f6;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    #status-text {
      color: #94a3b8; font-size: 12px;
      font-weight: 700; text-transform: uppercase;
      letter-spacing: 2px;
    }
    #error-text {
      color: #f87171; font-size: 11px;
      margin-top: 12px; display: none;
      text-align: center; max-width: 280px;
      line-height: 1.5;
    }
    #retry-btn {
      display: none; margin-top: 24px;
      padding: 12px 32px;
      background: #3b82f6; color: white;
      border: none; border-radius: 16px;
      font-weight: 800; font-size: 11px;
      text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer;
    }

    /* Legend */
    .legend {
      position: fixed; top: 16px; right: 16px; z-index: 1000;
      background: rgba(255,255,255,0.85); backdrop-filter: blur(20px);
      border-radius: 20px; padding: 14px 18px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.1);
      border: 1px solid rgba(255,255,255,0.4);
      font-size: 10px;
    }
    .legend-title {
      font-weight: 900; color: #1e293b;
      text-transform: uppercase; letter-spacing: 1.2px;
      margin-bottom: 8px; font-size: 8.5px;
    }
    .legend-item { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
    .legend-color { width: 22px; height: 5px; border-radius: 10px; }
    .legend-label { font-weight: 700; color: #475569; }

    /* Popup styling */
    .leaflet-popup-content-wrapper {
      border-radius: 24px !important;
      box-shadow: 0 15px 45px rgba(0,0,0,0.15) !important;
      border: 1px solid rgba(255,255,255,0.5) !important;
      backdrop-filter: blur(15px);
      background: rgba(255,255,255,0.95) !important;
    }
    .leaflet-popup-tip { background: rgba(255,255,255,0.95) !important; }
    .popup-title { font-size: 14px; font-weight: 900; color: #0f172a; margin-bottom: 12px; letter-spacing: -0.3px; }
    .popup-stat { background: #f1f5f9; border-radius: 16px; padding: 14px; border: 1px solid #e2e8f0; }
    .popup-pct { font-size: 26px; font-weight: 900; color: #10b981; letter-spacing: -1px; }
    .popup-bar { width: 100%; height: 6px; background: #e2e8f0; border-radius: 10px; overflow: hidden; margin: 8px 0; }
    .popup-bar-fill { height: 100%; border-radius: 10px; }
    .popup-detail { display: flex; justify-content: space-between; font-size: 10px; font-weight: 700; color: #64748b; text-transform: uppercase; }
    .detail-wp-btn {
      width: 100%; margin-top: 12px; padding: 12px;
      background: #10b981; color: white; border: none; border-radius: 14px;
      font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.2);
    }
    .detail-wp-btn:active { transform: scale(0.97); background: #059669; }

    /* WP Panel (slide-up) */
    #wp-panel-backdrop {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(15, 23, 42, 0.4); backdrop-filter: blur(4px);
      display: none; opacity: 0;
      transition: opacity 0.3s;
    }
    #wp-panel-backdrop.visible { display: block; opacity: 1; }

    #wp-panel {
      position: fixed; bottom: 0; left: 0; right: 0; z-index: 2001;
      background: rgba(255,255,255,0.9); backdrop-filter: blur(25px);
      border-radius: 36px 36px 0 0;
      max-height: 85vh; display: none;
      transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      flex-direction: column;
      box-shadow: 0 -10px 40px rgba(0,0,0,0.08);
      border: 1px solid rgba(255,255,255,0.5);
    }
    #wp-panel.visible { display: flex; transform: translateY(0); }

    .wp-panel-header {
      padding: 24px 24px 20px; border-bottom: 1px solid rgba(0,0,0,0.05);
      position: sticky; top: 0; z-index: 1;
      border-radius: 36px 36px 0 0;
    }
    .wp-panel-handle {
      width: 48px; height: 5px; background: rgba(0,0,0,0.1);
      border-radius: 10px; margin: 0 auto 18px;
    }
    .wp-panel-title { font-size: 20px; font-weight: 900; color: #0f172a; margin-bottom: 6px; letter-spacing: -0.5px; }
    .wp-panel-subtitle { font-size: 12px; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
    .wp-panel-piutang { 
      font-size: 22px; font-weight: 900; color: #ef4444; 
      margin-top: 10px; letter-spacing: -1px;
    }
    .wp-panel-close {
      position: absolute; top: 24px; right: 24px;
      width: 36px; height: 36px; border-radius: 50%;
      background: rgba(0,0,0,0.05); border: none; cursor: pointer;
      font-size: 14px; color: #475569; font-weight: bold;
      display: flex; align-items: center; justify-content: center;
    }

    .wp-list {
      overflow-y: auto; flex: 1; padding: 16px 20px 40px;
      -webkit-overflow-scrolling: touch;
    }
    .wp-card {
      padding: 20px; border: 1px solid rgba(0,0,0,0.04); border-radius: 24px;
      margin-bottom: 14px; background: white;
      box-shadow: 0 4px 20px rgba(0,0,0,0.03);
    }
    .wp-name { font-size: 14px; font-weight: 900; color: #1e293b; text-transform: uppercase; margin-bottom: 6px; letter-spacing: -0.3px; }
    .wp-nop { font-size: 11px; font-family: 'JetBrains Mono', monospace; color: #64748b; font-weight: 600; margin-bottom: 6px; }
    .wp-region { 
      font-size: 9px; color: #94a3b8; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; 
      background: #f8fafc; padding: 4px 8px; border-radius: 6px; display: inline-block;
    }
    .wp-amount { font-size: 18px; font-weight: 900; color: #ef4444; margin-top: 12px; letter-spacing: -0.8px; }
    .wp-actions { display: flex; gap: 10px; margin-top: 16px; }
    .wp-btn-pay {
      flex: 1; padding: 14px 16px; border: none; border-radius: 16px;
      font-size: 11px; font-weight: 900; text-transform: uppercase; letter-spacing: 1px;
      cursor: pointer; text-align: center; text-decoration: none; display: flex; align-items: center; justify-content: center;
      background: #10b981; color: white; transition: all 0.2s;
      box-shadow: 0 4px 15px rgba(16, 185, 129, 0.15);
    }
    .wp-btn-pay:active { transform: scale(0.96); background: #059669; }
    
    .wp-empty {
      text-align: center; padding: 60px 20px; color: #64748b;
    }
    .wp-empty-icon { font-size: 40px; margin-bottom: 12px; }
    .wp-empty-text { font-weight: 900; font-size: 13px; text-transform: uppercase; letter-spacing: 1.5px; }

    .wp-loading {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: 60px; gap: 16px;
    }
    .wp-loading-text { font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1.5px; }
    
    .wp-load-more {
      text-align: center; padding: 16px;
      color: #3b82f6; font-size: 11px; font-weight: 900;
      text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
      border: 1px dashed #bfdbfe; border-radius: 16px; margin-top: 8px;
    }
    .wp-load-more:active { background: #eff6ff; }

    /* New Search Styling */
    .wp-search-container {
      margin-top: 20px;
      position: relative;
    }
    .wp-search-input {
      width: 100%;
      background: #f1f5f9;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 16px 16px 16px 44px;
      font-size: 14px;
      font-weight: 700;
      color: #0f172a;
      outline: none;
      transition: all 0.2s;
    }
    .wp-search-input:focus {
      border-color: #10b981;
      background: white;
      box-shadow: 0 0 0 4px rgba(16, 185, 129, 0.1);
    }
    .wp-search-icon {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      color: #94a3b8;
      pointer-events: none;
    }

    /* Premium Sync Modal Styles */
    #sync-modal-overlay {
      position: fixed; inset: 0; z-index: 3000;
      background: rgba(15, 23, 42, 0.65); backdrop-filter: blur(8px);
      display: none; align-items: center; justify-content: center; padding: 24px;
      opacity: 0; transition: opacity 0.3s;
    }
    #sync-modal-overlay.visible { display: flex; opacity: 1; }
    
    #sync-modal {
      background: white; width: 100%; max-width: 400px;
      border-radius: 40px; padding: 32px;
      transform: scale(0.9); transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      display: flex; flex-direction: column; align-items: center;
      box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
    }
    #sync-modal-overlay.visible #sync-modal { transform: scale(1); }

    .sm-icon-container {
      width: 80px; height: 80px; border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 24px; font-size: 32px;
    }
    .sm-icon-success { background: #ecfdf5; color: #10b981; }
    .sm-icon-unpaid { background: #fff1f2; color: #f43f5e; }
    .sm-icon-error { background: #fffbeb; color: #f59e0b; }

    .sm-title { font-size: 20px; font-weight: 900; color: #0f172a; margin-bottom: 4px; text-transform: uppercase; letter-spacing: -0.5px; }
    .sm-subtitle { font-size: 10px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 24px; }
    
    .sm-box {
      width: 100%; background: #f8fafc; border: 1px solid #f1f5f9;
      border-radius: 24px; padding: 24px; margin-bottom: 32px;
    }
    .sm-message { font-size: 13px; color: #475569; text-align: center; font-weight: 600; line-height: 1.6; }
    .sm-divider { height: 1px; background: rgba(226, 232, 240, 0.6); margin: 16px 0; }
    .sm-wp-info { text-align: center; }
    .sm-wp-label { font-size: 9px; font-weight: 900; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px; }
    .sm-wp-name { font-size: 14px; font-weight: 900; color: #0f172a; text-transform: uppercase; }
    .sm-wp-nop { font-size: 11px; font-family: monospace; color: #64748b; font-weight: 600; margin-top: 2px; }

    .sm-actions { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .sm-btn {
      width: 100%; padding: 18px; border-radius: 22px; font-size: 11px;
      font-weight: 900; text-transform: uppercase; letter-spacing: 1.5px;
      cursor: pointer; text-align: center; border: none; transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    .sm-btn-primary { background: #065f46; color: white; box-shadow: 0 10px 15px -3px rgba(5, 150, 105, 0.2); }
    .sm-btn-secondary { background: #f1f5f9; color: #64748b; }
    .sm-btn:active { transform: translateY(2px); }
  </style>
</head>
<body>
  <div id="loading-overlay">
    <div class="spinner"></div>
    <div id="status-text">Menghubungkan...</div>
    <div id="error-text"></div>
    <button id="retry-btn" onclick="loadMap()">Coba Lagi</button>
  </div>

  <div id="map"></div>

  <!-- Legend -->
  <div class="legend">
    <div class="legend-title">Status Bayar</div>
    <div class="legend-item"><div class="legend-color" style="background:#10b981"></div><span class="legend-label">Sangat Baik</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#eab308"></div><span class="legend-label">Cukup</span></div>
    <div class="legend-item"><div class="legend-color" style="background:#ef4444"></div><span class="legend-label">Buruk</span></div>
  </div>

  <!-- WP Panel (slide up from bottom) -->
  <div id="wp-panel-backdrop" onclick="closeWpPanel()"></div>
  <div id="wp-panel">
    <div class="wp-panel-header">
      <div class="wp-panel-handle"></div>
      <button class="wp-panel-close" onclick="closeWpPanel()">✕</button>
      <div class="wp-panel-title" id="wp-panel-title">-</div>
      <div class="wp-panel-subtitle" id="wp-panel-subtitle">Memuat data...</div>
      <div class="wp-panel-piutang" id="wp-panel-piutang"></div>
      
      <!-- Search Input -->
      <div class="wp-search-container">
        <span class="wp-search-icon">🔍</span>
        <input 
          type="text" 
          id="wp-search-input" 
          class="wp-search-input" 
          placeholder="Cari Nama atau NOP..."
          oninput="handleSearchInput(this.value)"
        >
      </div>
    </div>
    <div class="wp-list" id="wp-list"></div>
  </div>

  <!-- Premium Sync Result Modal (App Style) -->
  <div id="sync-modal-overlay">
    <div id="sync-modal">
       <div id="sm-icon-box" class="sm-icon-container"></div>
       <div id="sm-title" class="sm-title"></div>
       <div class="sm-subtitle" id="sm-subtitle">Status Bapenda</div>
       
       <div class="sm-box">
          <div id="sm-message" class="sm-message"></div>
          <div id="sm-wp-section">
             <div class="sm-divider"></div>
             <div class="sm-wp-info">
                <div class="sm-wp-label">Informasi Objek</div>
                <div id="sm-wp-name" class="sm-wp-name"></div>
                <div id="sm-wp-nop" class="sm-wp-nop"></div>
             </div>
          </div>
       </div>

       <div class="sm-actions">
          <button id="sm-btn-pay" class="sm-btn sm-btn-primary">Lanjut ke Portal <span style="margin-left:8px">→</span></button>
          <button onclick="closeSyncModal()" class="sm-btn sm-btn-secondary">Tutup</button>
       </div>
    </div>
  </div>

  <script>
    var map = null;
    var geoLayer = null;
    var currentTahun = new Date().getFullYear();

    function getColor(pct) {
      if (pct === 0) return '#94a3b8';
      if (pct >= 90) return '#10b981';
      if (pct >= 75) return '#84cc16';
      if (pct >= 50) return '#eab308';
      if (pct >= 25) return '#f97316';
      return '#ef4444';
    }

    function getStatsKey(props) {
      if (props.regionType === 'RT') return 'RT_' + parseInt(props.rt || '0') + 'RW_' + parseInt(props.rw || '0');
      if (props.regionType === 'RW') return 'RW_' + parseInt(props.rw || '0');
      if (props.regionType === 'DUSUN') return 'DUSUN_' + (props.dusun || '').toUpperCase();
      if (props.regionType === 'DESA') return 'DESA_TOTAL';
      return '';
    }

    function formatRupiah(amount) {
      return 'Rp ' + Number(amount || 0).toLocaleString('id-ID');
    }

    function setStatus(text) {
      document.getElementById('status-text').textContent = text;
    }

    function showError(msg) {
      var el = document.getElementById('error-text');
      el.textContent = msg;
      el.style.display = 'block';
      document.getElementById('retry-btn').style.display = 'block';
    }

    function hideLoading() {
      document.getElementById('loading-overlay').classList.add('hidden');
    }

    // ========== WP Panel ==========
    var wpPanelPage = 1;
    var wpPanelHasMore = false;
    var wpPanelParams = {};

    function openWpPanel(type, rt, rw, dusun, title) {
      wpPanelPage = 1;
      wpPanelHasMore = false;
      wpPanelParams = { type: type, rt: rt, rw: rw, dusun: dusun };
      wpPanelSearch = '';
      
      var searchInput = document.getElementById('wp-search-input');
      if (searchInput) searchInput.value = '';

      document.getElementById('wp-panel-title').textContent = title;
      document.getElementById('wp-panel-subtitle').textContent = 'Memuat data...';
      document.getElementById('wp-panel-piutang').textContent = '';
      document.getElementById('wp-list').innerHTML = '<div class="wp-loading"><div class="spinner-sm"></div><div class="wp-loading-text">Mengambil Data WP...</div></div>';
      
      document.getElementById('wp-panel-backdrop').classList.add('visible');
      // Small delay for animation
      setTimeout(function() {
        document.getElementById('wp-panel').classList.add('visible');
      }, 50);
      
      fetchWpData(1, true);
    }

    function closeWpPanel() {
      document.getElementById('wp-panel').classList.remove('visible');
      setTimeout(function() {
        document.getElementById('wp-panel-backdrop').classList.remove('visible');
      }, 350);
    }

    var searchTimer = null;
    var wpPanelSearch = '';

    function handleSearchInput(val) {
      if (searchTimer) clearTimeout(searchTimer);
      searchTimer = setTimeout(function() {
        wpPanelSearch = val.trim();
        fetchWpData(1, true);
      }, 500);
    }

    async function fetchWpData(page, isInitial) {
      try {
        var params = new URLSearchParams({
          tahun: currentTahun.toString(),
          type: wpPanelParams.type,
          page: page.toString(),
          limit: '20'
        });
        if (wpPanelParams.rt) params.set('rt', wpPanelParams.rt);
        if (wpPanelParams.rw) params.set('rw', wpPanelParams.rw);
        if (wpPanelParams.dusun) params.set('dusun', wpPanelParams.dusun);
        if (wpPanelSearch) params.set('search', wpPanelSearch);

        var res = await fetch('/api/region-unpaid?' + params.toString() + '&_t=' + Date.now());
        var json = await res.json();

        wpPanelPage = page;
        wpPanelHasMore = json.hasMore;

        document.getElementById('wp-panel-subtitle').textContent = 
          json.totalCount + ' Wajib Pajak belum lunas (Tahun ' + currentTahun + ')';
        document.getElementById('wp-panel-piutang').textContent = formatRupiah(json.totalPiutang);

        // Store config globally for later use
        if (json.villageConfig) window.currentBapendaConfig = json.villageConfig;
        var bapendaConfig = window.currentBapendaConfig || {};

        var listEl = document.getElementById('wp-list');

        if (isInitial) {
          listEl.innerHTML = '';
        }

        if (json.data.length === 0 && isInitial) {
          listEl.innerHTML = '<div class="wp-empty"><div class="wp-empty-icon">🎉</div><div class="wp-empty-text" style="color:#10b981">Semua Terbayar Lunas!</div><div style="color:#94a3b8;font-size:11px;margin-top:6px">Tidak ada tunggakan di wilayah ini</div></div>';
          return;
        }

        // Remove existing "load more" button
        var existingLoadMore = listEl.querySelector('.wp-load-more');
        if (existingLoadMore) existingLoadMore.remove();

        json.data.forEach(function(wp) {
          var cleanNop = (wp.nop || '').replace(/\D/g, '');
          var cardId = 'wp-card-' + wp.id;
          var actionsHtml = '';
          var isPaymentEnabled = !!bapendaConfig.enableBapendaPayment;
          var isSyncEnabled = !!bapendaConfig.enableBapendaSync;
          var isJombang = !!bapendaConfig.isJombangBapenda;
          var hasPaymentUrl = !!bapendaConfig.bapendaPaymentUrl;
          var hasInfoUrl = !!bapendaConfig.bapendaUrl;
          
          if (isJombang && isPaymentEnabled && hasPaymentUrl) {
            actionsHtml = '<button class="wp-btn-pay wp-btn-check" data-nop="' + escapeHtml(wp.nop) + '" data-name="' + escapeHtml(wp.namaWp) + '" data-id="' + wp.id + '" data-ketetapan="' + wp.ketetapan + '">🔍 Cek & Bayar Online</button>';
          } else if (isJombang && isSyncEnabled && hasInfoUrl) {
            actionsHtml = '<button class="wp-btn-pay wp-btn-check" style="background:#334155" data-nop="' + escapeHtml(wp.nop) + '" data-name="' + escapeHtml(wp.namaWp) + '" data-id="' + wp.id + '" data-ketetapan="' + wp.ketetapan + '">🔍 Sinkron Bapenda</button>';
          } else {
            actionsHtml = ''; // Sembunyikan jika tidak ada fitur online aktif atau sistem jombang off
          }

          var card = document.createElement('div');
          card.className = 'wp-card';
          card.id = cardId;
          card.innerHTML = 
            '<div class="wp-name">' + escapeHtml(wp.namaWp) + '</div>' +
            '<div class="wp-nop">' + escapeHtml(wp.nop) + '</div>' +
            '<div class="wp-region">RT ' + (wp.rt || '-') + ' / RW ' + (wp.rw || '-') + '</div>' +
            '<div class="wp-amount">' + formatRupiah(wp.ketetapan) + '</div>' +
            '<div class="wp-actions">' + actionsHtml + '</div>';
          listEl.appendChild(card);
        });

        if (json.hasMore) {
          var loadMoreEl = document.createElement('div');
          loadMoreEl.className = 'wp-load-more';
          loadMoreEl.textContent = 'Muat Lebih Banyak ▼';
          loadMoreEl.onclick = function() {
            loadMoreEl.textContent = 'Memuat...';
            fetchWpData(wpPanelPage + 1, false);
          };
          listEl.appendChild(loadMoreEl);
        }

      } catch (err) {
        console.error('WP fetch error:', err);
        document.getElementById('wp-list').innerHTML = 
          '<div class="wp-empty"><div class="wp-empty-icon">⚠️</div><div class="wp-empty-text" style="color:#ef4444">Gagal Memuat Data</div><div style="color:#94a3b8;font-size:11px;margin-top:6px">' + err.message + '</div></div>';
      }
    }

    function escapeHtml(str) {
      return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ========== Check & Pay & Premium Modal ==========
    var checkCooldowns = {};

    function showSyncModal(type, title, message, wp, payUrl) {
      var overlay = document.getElementById('sync-modal-overlay');
      var iconBox = document.getElementById('sm-icon-box');
      var titleEl = document.getElementById('sm-title');
      var messageEl = document.getElementById('sm-message');
      var wpNameEl = document.getElementById('sm-wp-name');
      var wpNopEl = document.getElementById('sm-wp-nop');
      var btnPay = document.getElementById('sm-btn-pay');
      var wpSection = document.getElementById('sm-wp-section');

      // Set Icon & Theme
      iconBox.className = 'sm-icon-container ' + (type === 'success' ? 'sm-icon-success' : (type === 'unpaid' ? 'sm-icon-unpaid' : 'sm-icon-error'));
      iconBox.innerHTML = type === 'success' ? '✅' : (type === 'unpaid' ? '💳' : '⚠️');
      
      titleEl.textContent = title;
      messageEl.textContent = message;

      if (wp) {
        wpSection.style.display = 'block';
        wpNameEl.textContent = wp.namaWp;
        wpNopEl.textContent = wp.nop;
      } else {
        wpSection.style.display = 'none';
      }

      var isPaymentEnabled = (window.currentBapendaConfig && window.currentBapendaConfig.enableBapendaPayment);
      var isSyncEnabled = (window.currentBapendaConfig && window.currentBapendaConfig.enableBapendaSync);
      var isJombang = (window.currentBapendaConfig && window.currentBapendaConfig.isJombangBapenda);
      var bapendaName = (window.currentBapendaConfig && window.currentBapendaConfig.bapendaRegionName) || "EPAY";
      
      var configUrl = null;
      var showAdditionalButton = false;
      
      // Master Guard: Only show if Jombang system is enabled
      if (isJombang) {
        if (isPaymentEnabled && window.currentBapendaConfig.bapendaPaymentUrl) {
          configUrl = window.currentBapendaConfig.bapendaPaymentUrl;
          showAdditionalButton = true;
        } else if (isSyncEnabled && window.currentBapendaConfig.bapendaUrl) {
          configUrl = window.currentBapendaConfig.bapendaUrl;
          showAdditionalButton = true;
        }
      }

      if (showAdditionalButton && configUrl) {
        btnPay.style.display = 'flex';
        
        if (isPaymentEnabled) {
          btnPay.className = 'sm-btn sm-btn-primary';
          btnPay.innerHTML = 'Lanjut ke ' + bapendaName + ' <span style="margin-left:8px">→</span>';
        } else {
          btnPay.className = 'sm-btn sm-btn-secondary';
          btnPay.style.background = '#334155'; // Dark Slate
          btnPay.style.color = '#fff';
          btnPay.innerHTML = 'Cek Website Bapenda <span style="margin-left:8px">→</span>';
        }

        btnPay.onclick = function() {
          var cleanNop = wp.nop.replace(/\D/g, '');
          var targetUrl = configUrl;
          
          if (!isPaymentEnabled && (window.currentBapendaConfig && window.currentBapendaConfig.isJombangBapenda) && cleanNop.length === 18) {
            var k0 = cleanNop.substring(0, 2);
            var k1 = cleanNop.substring(2, 4);
            var k2 = cleanNop.substring(4, 7);
            var k3 = cleanNop.substring(7, 10);
            var k4 = cleanNop.substring(10, 13);
            var k5 = cleanNop.substring(13, 17);
            var k6 = cleanNop.substring(17, 18);
            var baseUrl = configUrl.split("?")[0];
            targetUrl = baseUrl + "?module=pbb&kata=" + k0 + "&kata1=" + k1 + "&kata2=" + k2 + "&kata3=" + k3 + "&kata4=" + k4 + "&kata5=" + k5 + "&kata6=" + k6 + "&viewpbb=";
          } else {
            targetUrl = configUrl.replace(/\{nop\}/gi, cleanNop);
          }
          
          window.open(targetUrl, '_blank');
          closeSyncModal();
        };
      } else {
        btnPay.style.display = 'none';
      }

      overlay.classList.add('visible');
    }

    function closeSyncModal() {
      document.getElementById('sync-modal-overlay').classList.remove('visible');
    }

    async function checkAndPay(btn) {
      var nop = btn.getAttribute('data-nop');
      var name = btn.getAttribute('data-name');
      var wpId = btn.getAttribute('data-id');
      var ketetapan = parseInt(btn.getAttribute('data-ketetapan') || '0');

      // Cooldown check (15s)
      var lastCheck = checkCooldowns[nop] || 0;
      var now = Date.now();
      if (now - lastCheck < 15000) {
        var remaining = Math.ceil((15000 - (now - lastCheck)) / 1000);
        showToast('⏳ Tunggu ' + remaining + ' detik lagi', '#f59e0b');
        return;
      }
      checkCooldowns[nop] = now;

      // Show loading state
      var origText = btn.innerHTML;
      btn.disabled = true;
      btn.innerHTML = '<div class="spinner-sm" style="width:16px;height:16px;border-width:2px;display:inline-block;vertical-align:middle;margin-right:6px"></div> Mengecek...';
      btn.style.opacity = '0.7';

      try {
        var res = await fetch('/api/check-bapenda', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ nop: nop, tahun: currentTahun, _t: Date.now() })
        });
        var data = await res.json();

        if (!res.ok) {
          throw new Error(data.error || 'Gagal terhubung ke Bapenda');
        }

        if (data.isPaid) {
          // Already paid! Show Modal
          showSyncModal('success', 'Pembayaran Lunas', 'Pembayaran terdeteksi lunas di server pusat!', { namaWp: name, nop: nop }, null);
          
          var cardEl = document.getElementById('wp-card-' + wpId);
          if (cardEl) {
            cardEl.style.transition = 'all 0.4s';
            cardEl.style.opacity = '0';
            cardEl.style.transform = 'translateX(-100%)';
            setTimeout(function() { cardEl.remove(); }, 400);
          }
          // Update counters
          var subtitleEl = document.getElementById('wp-panel-subtitle');
          var currentCount = parseInt(subtitleEl.textContent) || 0;
          if (currentCount > 0) {
            subtitleEl.textContent = (currentCount - 1) + ' Wajib Pajak belum lunas (Tahun ' + currentTahun + ')';
          }
        } else {
          // Not paid - show Modal
          showSyncModal('unpaid', 'Belum Terbayar', 'Tagihan masih tercatat BELUM LUNAS di server pusat.', { namaWp: name, nop: nop });
        }

      } catch (err) {
        console.error('Check Bapenda error:', err);
        showSyncModal('error', 'Gangguan Sistem', 'Gagal menghubungkan ke server Bapenda. Pastikan koneksi internet Anda stabil.', null, null);
      } finally {
        // Restore button
        btn.disabled = false;
        btn.innerHTML = origText;
        btn.style.opacity = '1';
      }
    }

    // Simple toast notification
    function showToast(message, color) {
      var existing = document.getElementById('map-toast');
      if (existing) existing.remove();

      var toast = document.createElement('div');
      toast.id = 'map-toast';
      toast.style.cssText = 'position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:9999;background:' + color + ';color:white;padding:12px 20px;border-radius:16px;font-size:12px;font-weight:700;box-shadow:0 8px 32px rgba(0,0,0,0.3);max-width:85vw;text-align:center;transition:opacity 0.4s;';
      toast.textContent = message;
      document.body.appendChild(toast);
      setTimeout(function() {
        toast.style.opacity = '0';
        setTimeout(function() { toast.remove(); }, 400);
      }, 3500);
    }

    // Global click handler for check buttons
    document.addEventListener('click', function(e) {
      var btn = e.target.closest('.wp-btn-check');
      if (btn) {
        e.preventDefault();
        checkAndPay(btn);
      }
    });
    // ========== End WP Panel ==========

    async function loadMap() {
      // Reset UI
      document.getElementById('error-text').style.display = 'none';
      document.getElementById('retry-btn').style.display = 'none';
      document.getElementById('loading-overlay').classList.remove('hidden');

      var geoData = null;
      var stats = {};

      try {
        // Step 1: Load village config
        setStatus('Memuat Konfigurasi...');
        var configRes = await fetch('/api/village-config?_t=' + Date.now());
        var config = {};
        if (configRes.ok) {
          config = await configRes.json();
          window.currentBapendaConfig = config;
          if (config.tahunPajak) currentTahun = config.tahunPajak;
        }
        var centerLat = config.mapCenterLat || -7.5744;
        var centerLng = config.mapCenterLng || 112.235;
        var defaultZoom = config.mapDefaultZoom || 15;

        // Step 2: Load GeoJSON
        setStatus('Memuat Batas Wilayah...');
        var geoRes = await fetch('/maps/village.json?v=' + Date.now());
        if (!geoRes.ok) throw new Error('Gagal memuat peta: ' + geoRes.status);
        geoData = await geoRes.json();

        // Step 3: Load Stats
        setStatus('Memuat Data Statistik...');
        var statsRes = await fetch('/api/region-stats?tahun=' + currentTahun);
        if (statsRes.ok) stats = await statsRes.json();

        // Step 4: Render Map
        setStatus('Menggambar Peta...');

        if (!map) {
          map = L.map('map', {
            center: [centerLat, centerLng],
            zoom: defaultZoom,
            zoomControl: false
          });

          L.control.zoom({ position: 'topleft' }).addTo(map);

          L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OSM'
          }).addTo(map);
        }

        // Remove old layer
        if (geoLayer) map.removeLayer(geoLayer);

        // Add GeoJSON
        geoLayer = L.geoJSON(geoData, {
          style: function(feature) {
            var props = feature.properties;
            var type = props.regionType;
            var key = getStatsKey(props);
            var s = stats[key] || { percentage: 0 };

            var hasRT = geoData.features.some(function(f) { return f.properties.regionType === 'RT'; });
            var hasRW = geoData.features.some(function(f) { return f.properties.regionType === 'RW'; });
            var hasDusun = geoData.features.some(function(f) { return f.properties.regionType === 'DUSUN'; });

            var isPrimary = 
              (type === 'RT') ||
              (type === 'RW' && !hasRT) ||
              (type === 'DUSUN' && !hasRW && !hasRT) ||
              (type === 'DESA' && !hasDusun && !hasRW && !hasRT);

            return {
              fillColor: isPrimary ? getColor(s.percentage) : 'transparent',
              fillOpacity: isPrimary ? 0.65 : 0,
              weight: type === 'DESA' ? 3.5 : type === 'DUSUN' ? 2 : 1,
              color: type === 'DESA' ? '#000' : type === 'DUSUN' ? '#475569' : '#94a3b8',
              dashArray: type === 'DESA' ? '' : '4',
              interactive: isPrimary
            };
          },
          onEachFeature: function(feature, layer) {
            var props = feature.properties;
            var key = getStatsKey(props);
            var s = stats[key] || { total: 0, lunas: 0, percentage: 0 };
            var color = getColor(s.percentage);
            var pct = Math.round(s.percentage);

            var title = '';
            if (props.regionType === 'RT') title = 'RT ' + (props.rt || '') + ' RW ' + (props.rw || '');
            else if (props.regionType === 'RW') title = 'RW ' + (props.rw || '');
            else if (props.regionType === 'DUSUN') title = 'Dusun ' + (props.dusun || '');
            else if (props.regionType === 'DESA') title = 'Desa Balongbesuk';

            // Build the "Detail WP" button data
            var btnData = 'data-type="' + props.regionType + '"'
              + ' data-rt="' + (props.rt || '') + '"'
              + ' data-rw="' + (props.rw || '') + '"'
              + ' data-dusun="' + (props.dusun || '') + '"'
              + ' data-title="' + escapeHtml(title) + '"';

            var html = '<div style="min-width:170px">' +
              '<div class="popup-title">' + title + '</div>' +
              '<div class="popup-stat">' +
                '<div style="display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px">' +
                  '<span class="popup-pct">' + pct + '%</span>' +
                  '<span style="font-size:10px;font-weight:700;color:' + color + ';text-transform:uppercase">Lunas</span>' +
                '</div>' +
                '<div class="popup-bar"><div class="popup-bar-fill" style="width:' + pct + '%;background:' + color + '"></div></div>' +
                '<div class="popup-detail"><span>' + s.lunas + ' Terbayar</span><span>' + s.total + ' Objek</span></div>' +
              '</div>' +
              '<button class="detail-wp-btn" ' + btnData + '>Detail WP Belum Bayar</button>' +
            '</div>';

            layer.bindPopup(html, { closeButton: false, minWidth: 200 });

            layer.on({
              mouseover: function(e) { e.target.setStyle({ fillOpacity: 0.85, weight: 2 }); },
              mouseout: function(e) { geoLayer.resetStyle(e.target); },
              click: function(e) { layer.openPopup(); }
            });
          }
        }).addTo(map);

        // Done
        hideLoading();
        map.invalidateSize();

      } catch (err) {
        console.error('Map load error:', err);
        showError('Gagal memuat peta: ' + err.message + '. Pastikan server berjalan dan koneksi stabil.');
      }
    }

    // Global click handler for dynamically created "Detail WP" buttons
    document.addEventListener('click', function(e) {
      var btn = e.target;
      if (btn.classList && btn.classList.contains('detail-wp-btn')) {
        var type = btn.getAttribute('data-type');
        var rt = btn.getAttribute('data-rt');
        var rw = btn.getAttribute('data-rw');
        var dusun = btn.getAttribute('data-dusun');
        var title = btn.getAttribute('data-title');
        openWpPanel(type, rt, rw, dusun, title);
      }
    });

    // Start
    loadMap();
  </script>
